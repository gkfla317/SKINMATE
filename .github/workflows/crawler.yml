name: 화해 뷰티 제품 데이터 수집

on:
  schedule:
    # 매일 오전 6시 (KST) 실행
    - cron: '0 21 * * *'  # UTC 21:00 = KST 06:00
  workflow_dispatch:  # 수동 실행 가능

jobs:
  crawl-data:
    runs-on: ubuntu-latest
    
    steps:
    - name: 코드 체크아웃
      uses: actions/checkout@v4
      
    - name: Python 환경 설정
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: 의존성 설치
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: 데이터베이스 디렉토리 생성
      run: |
        mkdir -p instance
        
    - name: 크롤러 실행
      run: |
        python main.py
      env:
        # 환경 변수 설정 (필요시)
        PYTHONPATH: ${{ github.workspace }}
        
    - name: 로그 파일 업로드
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: crawler-logs
        path: |
          crawler.log
          instance/skinmate.sqlite
        retention-days: 7
        
    - name: 변경사항 커밋 및 푸시
      if: success()
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add instance/skinmate.sqlite
        git commit -m "🤖 자동 업데이트: 화해 뷰티 제품 데이터 (${{ github.run_number }})" || echo "변경사항이 없습니다."
        git push
        
    - name: 실패 알림
      if: failure()
      run: |
        echo "크롤링 작업이 실패했습니다!"
        echo "로그를 확인해주세요."
