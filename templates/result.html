
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKINMATE</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <header>
        <div class="logo">
            <a href="/"><img src="{{ url_for('static', filename='images/skinmate_logo.png') }}" alt="SKINMATE 로고"></a>
        </div>
        <nav class="main-menu">
            <ul>
                <li><a href="#">ABOUT</a></li>
                <li><a href="#">기술 소개</a></li>
                <li><a href="#">1:1 추천</a></li>
                <li><a href="#">AI 고민상담</a></li>
                <li><a href="#">커뮤니티</a></li>
            </ul>
        </nav>
        <nav class="user-menu">
            <ul>
                <li><a href="#"><img src="{{ url_for('static', filename='images/user_icon.png') }}" alt="마이페이지"></a></li>
                <li><a href="#"><img src="{{ url_for('static', filename='images/heart_icon.png') }}" alt="찜"></a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="result-container">
            <div class="result-image">
                <h2>분석 이미지</h2>
                <img src="{{ uploaded_image }}" alt="분석한 이미지">
            </div>
            <div class="result-details">
                <h2>AI 피부 분석 결과</h2>
                <div class="score-display">
                    <p>당신의 피부 탄력 점수는</p>
                    <span class="score-value">{{ "%.2f"|format(score) }}</span>
                    <p class="score-max">/ 100</p>
                </div>
                <div class="result-description">
                    <p>AI가 분석한 결과, 현재 고객님의 피부 탄력 상태는 양호한 편입니다. 꾸준한 관리를 통해 더욱 건강한 피부를 유지해보세요.</p>
                </div>
                <div class="button-group-vertical">
                    <a href="/analysis" class="result-button-retry">다시 테스트하기</a>
                    <a href="/recommendations" class="result-button-recommend">추천 상품 보러가기</a>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2025 SKINMATE. All Rights Reserved.</p>
    </footer>

</body>
</html>
