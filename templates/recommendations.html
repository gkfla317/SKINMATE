
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>추천 상품 - SKINMATE</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <header>
        <div class="logo">
            <a href="/"><img src="{{ url_for('static', filename='images/skinmate_logo.png') }}" alt="SKINMATE 로고"></a>
        </div>
        <nav class="main-menu">
            <ul>
                <li><a href="#">ABOUT</a></li>
                <li><a href="#">기술 소개</a></li>
                <li><a href="#">1:1 추천</a></li>
                <li><a href="#">AI 고민상담</a></li>
                <li><a href="#">커뮤니티</a></li>
            </ul>
        </nav>
        <nav class="user-menu">
            <ul>
                <li><a href="#">마이페이지</a></li>
                <li><a href="#">찜</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="recommendations-container">
            <h1>AI 분석 기반 추천 상품</h1>
            <p>고객님의 피부 분석 결과에 따라, 다음과 같은 상품들을 추천해 드립니다.</p>
            
            <div class="product-grid">
                <!-- 예시 상품 1 -->
                <div class="product-card">
                    <img src="https://via.placeholder.com/250x250.png?text=Product+Image" alt="추천 상품 1">
                    <h3>탄력 강화 세럼</h3>
                    <p>피부 속부터 촘촘하게 채워주는 고농축 세럼</p>
                    <span class="price">45,000원</span>
                </div>

                <!-- 예시 상품 2 -->
                <div class="product-card">
                    <img src="https://via.placeholder.com/250x250.png?text=Product+Image" alt="추천 상품 2">
                    <h3>리프팅 크림</h3>
                    <p>피부 장벽을 강화하고 탄력을 끌어올리는 크림</p>
                    <span class="price">58,000원</span>
                </div>

                <!-- 예시 상품 3 -->
                <div class="product-card">
                    <img src="https://via.placeholder.com/250x250.png?text=Product+Image" alt="추천 상품 3">
                    <h3>콜라겐 아이패치</h3>
                    <p>눈가 주름과 탄력을 집중 케어하는 하이드로겔 패치</p>
                    <span class="price">2,500원</span>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2025 SKINMATE. All Rights Reserved.</p>
    </footer>

</html>
